name: Auto-blog (Visage Aesthetics)

# Runs daily at 09:00 UTC. Picks an unwritten topic from
# scripts/blog-topics.json, drafts a 1,500-word post in Bernadette's
# voice (using the Anthropic API + web search), adds an FAQ block and
# FAQPage schema, then commits and publishes. Once every topic has been
# written, it instead refreshes the oldest post (bumping dateModified +
# sitemap lastmod) so the daily run always keeps the site fresh.
#
# To enable:
#   1. In GitHub repo Settings → Secrets and variables → Actions →
#      add a secret called ANTHROPIC_API_KEY (get from
#      console.anthropic.com → API Keys).
#   2. Optionally set repo variable AUTO_PUBLISH=true if you want the
#      job to push direct to main instead of opening a PR.
#   3. The workflow runs automatically on the cron schedule below, or
#      manually via the "Run workflow" button on the Actions tab.

on:
  schedule:
    # Daily at 09:00 UTC (10:00 BST). A new post when topics remain,
    # otherwise a freshness refresh of the oldest post.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      force_topic:
        description: 'Force a specific topic slug (optional)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Anthropic SDK + tsx
        run: npm install --no-save @anthropic-ai/sdk tsx

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_TOPIC: ${{ inputs.force_topic }}
        run: npx tsx scripts/generate-blog-post.ts

      - name: Verify build
        run: npm run build

      - name: Inspect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "## Changed files" >> "$GITHUB_STEP_SUMMARY"
            git diff --name-only >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Auto-publish to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          # New post adds a blog page; a refresh only modifies existing files.
          if git status --porcelain | grep -qE '^\?\? src/app/blog/'; then
            MSG="chore(blog): auto-generated post"
          else
            MSG="chore(blog): refresh oldest post for freshness"
          fi
          git add -A
          git commit -m "$MSG"
          git push origin main
