name: Scout awards & press (Visage Aesthetics)

# Runs twice a week (Mondays and Thursdays, 08:00 UTC). Uses the Anthropic API + web search to
# find free-to-enter awards the clinic qualifies for and relevant press /
# journalist opportunities, drafts an entry or pitch in Bernadette's voice,
# and stores each as 'new' in the opportunities table for review in the
# Assistant (/staff/assistant/visibility). Nothing is ever submitted
# automatically.
#
# To enable, add these repo secrets (Settings -> Secrets and variables ->
# Actions):
#   ANTHROPIC_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# Run it manually any time via the "Run workflow" button on the Actions tab.

on:
  schedule:
    - cron: '0 8 * * 1,4'
  workflow_dispatch:
    inputs:
      only:
        description: 'Restrict to one kind: award or press (optional)'
        required: false
        type: string
      dry_run:
        description: 'Log finds without writing to the database'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Anthropic SDK + tsx
        run: npm install --no-save @anthropic-ai/sdk tsx

      - name: Scout opportunities
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCOUT_ONLY: ${{ inputs.only }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: npx tsx scripts/scout-opportunities.ts
